version: 2

project_name: canvas

builds:
  - id: canvas
    main: ./cmd/canvas
    binary: canvas
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/thedavidweng/canvas-cli/internal/cli.Version={{.Version}}
      - -X github.com/thedavidweng/canvas-cli/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/thedavidweng/canvas-cli/internal/cli.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats: [tar.gz]
    name_template: "canvas_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Maintenance"
      regexp: '^.*?(chore|refactor|style|test|ci)(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "Dependencies"
      regexp: '^.*?(build|deps)(\([[:word:]]+\))??!?:.+$'
      order: 4
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore: release"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: thedavidweng
    name: canvas-cli
  header: |
    ## What's Changed

    See the [changelog](https://github.com/thedavidweng/canvas-cli/blob/main/CHANGELOG.md) for full details.
  footer: |
    **Full Changelog**: https://github.com/thedavidweng/canvas-cli/compare/{{ .PreviousTag }}...{{ .Tag }}

    ---
    ### Installation

    **Homebrew (macOS/Linux):**
    ```
    brew tap thedavidweng/tap
    brew install canvas
    ```

    **Go:**
    ```
    go install github.com/thedavidweng/canvas-cli/cmd/canvas@{{ .Tag }}
    ```

signs:
  - artifacts: checksum
    cmd: cosign
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"

homebrew_casks:
  - name: canvas
    binaries:
      - canvas
    generate_completions_from_executable:
      executable: "canvas"
      args:
        - completion
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    repository:
      owner: thedavidweng
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/thedavidweng/canvas-cli"
    description: "Agent-friendly CLI for Canvas LMS course management, assignments, submissions, and more"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
