version: "2"

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - prealloc
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - encoding/json.Unmarshal
        - encoding/json.NewEncoder.Encode
        - encoding/json.NewDecoder.Decode
        - (*os.File).Close
        - os.Unsetenv
        - os.Setenv
        - os.WriteFile
        - os.MkdirAll
        - net/http.Get
        - (*net/http.Client).Do
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - (*io.ReadCloser).Read

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/thedavidweng/canvas-cli
